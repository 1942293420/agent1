<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentOS — 多智能体协同管理平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>window.addEventListener('error',e=>{if(e.message&&e.message.includes('message port closed'))e.stopImmediatePropagation()},true)</script>
    <style>
      @media(max-width:768px) {
        html, body { overflow: auto !important; -webkit-overflow-scrolling: touch !important; height: auto !important; }
        #root { display: block !important; min-height: auto !important; height: auto !important; }
        .main-content { overflow: visible !important; display: block !important; height: auto !important; min-height: auto !important; }
        .view-container { overflow: visible !important; }
        .session-detail-panel { overflow: visible !important; }
        .session-messages { overflow-y: visible !important; }
        .card, .data-table { overflow: visible !important; }
      }
    </style>
  </body>
</html>
